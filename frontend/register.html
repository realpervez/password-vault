<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Vault — Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
    <h1>Create Account</h1>
    <p class="subtitle">Set up your vault</p>

    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" />
    </div>

    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email" />
    </div>

    <div class="form-group">
        <label>Master Password</label>
        <input type="password" id="masterPassword" placeholder="Enter master password" />
    </div>

    <button onclick="register()">Create Account</button>
    <p class="error" id="error"></p>
    <p class="success" id="success" style="color:#44ff88;font-size:13px;margin-top:12px;text-align:center;"></p>

    <div class="link">
        Already have an account? <a href="index.html">Sign in</a>
    </div>
</div>

<script>
    async function register() {
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const masterPassword = document.getElementById('masterPassword').value;

        try {
            const res = await fetch('https://password-vault-production-d1e3.up.railway.app/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, masterPassword })
            });

            const data = await res.json();

            if (res.ok) {
                document.getElementById('success').textContent = 'Account created. Redirecting...';
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                document.getElementById('error').textContent = data;
            }
        } catch (err) {
            document.getElementById('error').textContent = 'Could not connect to server.';
        }
    }
</script>
</body>
</html>
