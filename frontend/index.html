<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Vault — Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
    <h1>Password Vault</h1>
    <p class="subtitle">Sign in to your vault</p>

    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" />
    </div>

    <div class="form-group">
        <label>Master Password</label>
        <input type="password" id="masterPassword" placeholder="Enter master password" />
    </div>

    <button onclick="login()">Sign In</button>
    <p class="error" id="error"></p>

    <div class="link">
        Don't have an account? <a href="register.html">Register</a>
    </div>
</div>

<script>
    async function login() {
        const username = document.getElementById('username').value;
        const masterPassword = document.getElementById('masterPassword').value;

        try {
            const res = await fetch('https://password-vault-production-d1e3.up.railway.app/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, masterPassword })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                sessionStorage.setItem('masterPassword', masterPassword);
                window.location.href = 'dashboard.html';
            } else {
                const errorText = await res.text();
                document.getElementById('error').textContent = errorText;
            }
        } catch (err) {
            document.getElementById('error').textContent = 'Could not connect to server.';
        }
    }
</script>
</body>
</html>
